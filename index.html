<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 자산 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <span class="logo">내 자산 관리</span>
        <div class="header-summary">
          <div class="summary-item">
            <span class="summary-label">순자산</span>
            <strong id="header-networth">₩0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">월 저축</span>
            <strong id="header-saving">₩0</strong>
          </div>
        </div>
      </div>
    </header>

    <main class="container main-grid">

      <!-- 월 수입 -->
      <section class="card income-card">
        <h2 class="section-title">월 수입</h2>
        <div class="income-row">
          <input type="number" id="monthly-income" placeholder="월 수입 입력 (원)" />
          <button class="btn primary" onclick="saveIncome()">저장</button>
        </div>
      </section>

      <!-- 요약 카드 -->
      <section class="summary-cards">
        <div class="stat-card green">
          <span class="stat-label">총 자산</span>
          <strong id="total-assets">₩0</strong>
        </div>
        <div class="stat-card red">
          <span class="stat-label">총 부채</span>
          <strong id="total-liabilities">₩0</strong>
        </div>
        <div class="stat-card blue">
          <span class="stat-label">순자산</span>
          <strong id="net-worth">₩0</strong>
        </div>
        <div class="stat-card orange">
          <span class="stat-label">월 상환액</span>
          <strong id="monthly-payment">₩0</strong>
        </div>
      </section>

      <!-- 자산 섹션 -->
      <section class="card">
        <h2 class="section-title">자산</h2>
        <div class="form-row">
          <input type="text" id="asset-name" placeholder="자산명 (예: 국민은행)" />
          <select id="asset-category">
            <option value="현금">현금</option>
            <option value="주식">주식</option>
            <option value="부동산">부동산</option>
            <option value="암호화폐">암호화폐</option>
            <option value="기타">기타</option>
          </select>
          <input type="number" id="asset-amount" placeholder="금액 (원)" />
          <button class="btn primary" onclick="addAsset()">추가</button>
        </div>
        <div id="asset-list" class="item-list"></div>
      </section>

      <!-- 부채 섹션 -->
      <section class="card">
        <h2 class="section-title">부채</h2>
        <div class="form-row">
          <input type="text" id="liability-name" placeholder="부채명 (예: 주택담보대출)" />
          <input type="number" id="liability-total" placeholder="총 부채액 (원)" />
          <input type="number" id="liability-monthly" placeholder="월 상환액 (원)" />
          <button class="btn danger" onclick="addLiability()">추가</button>
        </div>
        <div id="liability-list" class="item-list"></div>
      </section>

      <!-- 그래프 섹션 -->
      <section class="card charts-grid">
        <div class="chart-box">
          <h2 class="section-title">자산 카테고리별 분류</h2>
          <canvas id="category-chart"></canvas>
        </div>
        <div class="chart-box">
          <h2 class="section-title">순자산 증가 예측 (12개월)</h2>
          <canvas id="growth-chart"></canvas>
        </div>
      </section>

      <!-- 월별 요약 -->
      <section class="card monthly-summary">
        <h2 class="section-title">월별 재정 요약</h2>
        <div class="summary-grid">
          <div class="summary-row">
            <span>월 수입</span>
            <strong id="sum-income" class="green-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>월 상환액</span>
            <strong id="sum-payment" class="red-text">₩0</strong>
          </div>
          <div class="summary-row highlight">
            <span>월 저축 가능액</span>
            <strong id="sum-savings">₩0</strong>
          </div>
          <div class="summary-row">
            <span>1년 후 예상 순자산</span>
            <strong id="sum-1year" class="blue-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>3년 후 예상 순자산</span>
            <strong id="sum-3year" class="blue-text">₩0</strong>
          </div>
        </div>
      </section>

    </main>

    <script src="./src/scripts/main.js"></script>
  </body>
</html>
